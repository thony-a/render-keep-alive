name: Keep Render Services Awake (Pro)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Set URLs
        run: |
          echo "API_URL=https://enerbyte-api.onrender.com/api/docs/" >> $GITHUB_ENV
          echo "FRONT_URL=https://enerbyte-front.onrender.com/" >> $GITHUB_ENV

      # 1. BACKEND PRIMERO
      - name: Ping API (with retries)
        run: |
          echo "=== Ping API ==="
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 "$API_URL") || STATUS="000"
            echo "Intento $i → status: $STATUS"

            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              echo "API OK"
              break
            fi

            echo "Reintentando en 5s..."
            sleep 5
          done

          echo "API final status: $STATUS"
        continue-on-error: true

      # Espera para que el backend termine de levantar
      - name: Wait before frontend
        run: |
          echo "Esperando backend..."
          sleep 15

      # 2. FRONTEND
      - name: Ping Frontend (slow start optimized)
        run: |
          echo "=== Ping Frontend ==="

          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 40 "$FRONT_URL") || STATUS="000"
            echo "Intento $i → status: $STATUS"

            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              echo "Frontend OK"
              break
            fi

            echo "Esperando 10s antes de reintentar..."
            sleep 10
          done

          echo "Frontend final status: $STATUS"
        continue-on-error: true

      # LOG FINAL
      - name: Done
        run: |
          echo "=== Keep-alive ejecutado correctamente ==="
          date