name: Keep Render Services Awake (Pro)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Set URLs
        run: |
          echo "API_URL=https://enerbyte-api.onrender.com/api/docs/" >> $GITHUB_ENV
          echo "FRONT_URL=https://enerbyte-front.onrender.com/" >> $GITHUB_ENV

      # API
      - name: Ping API (with retries)
        run: |
          echo "=== Ping API ==="
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$API_URL") || STATUS="000"
            echo "Intento $i → status: $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              echo "API OK"
              break
            fi
            echo "Reintentando en 5s..."
            sleep 5
          done
          echo "API final status: $STATUS"
        continue-on-error: true

      # Pequeña pausa para asegurar que backend esté listo
      - name: Wait before frontend
        run: sleep 10

      # LUEGO FRONTEND
      - name: Ping Frontend (with retries)
        run: |
          echo "=== Ping Frontend ==="
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$FRONT_URL") || STATUS="000"
            echo "Intento $i → status: $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              echo "Frontend OK"
              break
            fi
            echo "Reintentando en 5s..."
            sleep 5
          done
          echo "Frontend final status: $STATUS"
        continue-on-error: true

      - name: Done
        run: |
          echo "=== Keep-alive ejecutado ==="
          date