name: Keep Render Services Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Frontend
        run: |
          echo "Haciendo ping al frontend..."
          curl -s -o /dev/null -w "Frontend status: %{http_code}\n" https://enerbyte-front.onrender.com/ || echo "Error en frontend"

      - name: Ping API
        run: |
          echo "Haciendo ping al API..."
          curl -s -o /dev/null -w "API status: %{http_code}\n" https://enerbyte-api.onrender.com/api/docs/ || echo "Error en API"
